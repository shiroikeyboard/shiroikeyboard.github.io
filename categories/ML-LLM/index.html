<style>
  /* 基础样式 */
  #hacker-loader {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    font-family: 'Courier New', monospace;
    overflow: hidden;
  }
  
  .hacker-container {
    text-align: center;
    position: relative;
    z-index: 2;
  }
  
  .hacker-text {
    color: #fff;
    font-size: 3rem;
    letter-spacing: 0.5rem;
    text-shadow: 0 0 10px rgba(255, 255, 255, 0.7);
    margin-bottom: 2rem;
  }
  
  .hacker-progress {
    color: #fff;
    font-size: 0.8rem;
    letter-spacing: 0.2rem;
    margin-top: 1rem;
    opacity: 0.8;
  }
  
  .hacker-progress-bar {
    width: 200px;
    height: 2px;
    background: rgba(255, 255, 255, 0.2);
    margin: 10px auto;
    overflow: hidden;
  }
  
  .hacker-progress-bar:after {
    content: '';
    display: block;
    height: 100%;
    width: 100%;
    background: linear-gradient(90deg, transparent, #fff, transparent);
    animation: progress 2s linear infinite;
    transform: translateX(-100%);
  }
  
  @keyframes progress {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }
  
  /* 终端光标效果 */
  .cursor {
    display: inline-block;
    width: 10px;
    height: 1.2rem;
    background: #fff;
    margin-left: 5px;
    vertical-align: middle;
    animation: blink 0.7s infinite;
  }
  
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }
  
  /* 完成后的效果 */
  .complete .hacker-text {
    animation: glitch 0.5s linear 2;
  }
  
  @keyframes glitch {
    0% { transform: translate(0); }
    20% { transform: translate(-2px, 2px); }
    40% { transform: translate(-2px, -2px); }
    60% { transform: translate(2px, 2px); }
    80% { transform: translate(2px, -2px); }
    100% { transform: translate(0); }
  }
  
  /* 滑动切屏动画 */
  .slide-transition {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #fff;
    z-index: 9998;
    transform: translateX(100%);
    pointer-events: none;
  }
  
  /* 主内容初始状态 */
  main {
    opacity: 0;
    transform: translateX(-30px);
    transition: all 0.8s cubic-bezier(0.22, 1, 0.36, 1);
  }
</style>

<div id="hacker-loader">
  <!-- 滑动转场元素 -->
  <div class="slide-transition" id="slide-transition"></div>
  
  <div class="hacker-container">
    <div class="hacker-text" id="hacker-display"></div>
    <div class="hacker-progress"></div>
    <div class="hacker-progress-bar"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.4/gsap.min.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    const targetText = "r1ng0rez";
    const display = document.getElementById('hacker-display');
    const loader = document.getElementById('hacker-loader');
    const slideTransition = document.getElementById('slide-transition');
    const chars = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz!@#$%^&*()";
    let currentPosition = 0;
    let iterations = 0;
    const maxIterations = 3;
    
    function randomChar() {
      return chars[Math.floor(Math.random() * chars.length)];
    }
    
    function animateText() {
      let result = "";
      let completed = true;
      
      for (let i = 0; i < targetText.length; i++) {
        if (i < currentPosition) {
          result += targetText[i];
        } else if (i === currentPosition && iterations < maxIterations) {
          result += randomChar();
          completed = false;
        } else {
          result += " ";
        }
      }
      
      display.innerHTML = result + '<span class="cursor"></span>';
      
      if (completed) {
        currentPosition++;
        iterations = 0;
        
        if (currentPosition >= targetText.length) {
          display.innerHTML = targetText;
          loader.classList.add('complete');
          
          // 启动滑动转场动画
          startTransition();
          return;
        }
      } else {
        iterations++;
      }
      
      const speed = currentPosition < 3 ? 80 : 50 + Math.random() * 50;
      setTimeout(animateText, speed);
    }
    
    function startTransition() {
      // 滑动动画
      gsap.to(slideTransition, {
        x: "0%",
        duration: 0.8,
        ease: "power2.in",
        onComplete: function() {
          // 隐藏加载器
          loader.style.display = 'none';
          
          // 显示主内容
          gsap.to("main", {
            opacity: 1,
            x: 0,
            duration: 0.8,
            ease: "power2.out",
            delay: 0.2
          });
          
          // 滑出转场面板
          gsap.to(slideTransition, {
            x: "-100%",
            duration: 0.8,
            ease: "power2.out",
            delay: 0.3
          });
        }
      });
    }
    
    // 确保页面内容已加载
    function checkPageLoaded() {
      if (document.readyState === 'complete') {
        setTimeout(animateText, 500);
      } else {
        window.addEventListener('load', function() {
          setTimeout(animateText, 500);
        });
      }
    }
    
    checkPageLoaded();
  });
</script>
